<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORLAB - Plate Cropper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --accent:#a78bfa;--accent2:#f472b6;--grad:linear-gradient(135deg,#7dd3fc,#a78bfa,#f472b6);
    --bg:#0c0a14;--surface:#15121f;
    --border:#2a2440;--text:#e8ecf0;--muted:#8b7faa;
    --danger:#ff5c5c;--warn:#ffc84e;
  }
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:'JetBrains Mono','SF Mono',monospace;
    display:flex;flex-direction:column;
  }

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;border-bottom:1px solid var(--border);
    flex-shrink:0;gap:12px;flex-wrap:wrap;
  }
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar h1{
    font-size:18px;font-weight:700;letter-spacing:.12em;white-space:nowrap;
    background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .progress-mini{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .progress-mini .bar{width:80px;height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
  .progress-mini .fill{height:100%;background:var(--grad);border-radius:2px;transition:width .3s}

  /* Buttons row */
  .toolbar{
    display:flex;align-items:center;gap:8px;
    padding:8px 20px;border-bottom:1px solid var(--border);
    flex-shrink:0;flex-wrap:wrap;
  }
  .toolbar-group{display:flex;align-items:center;gap:6px}
  .toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}

  .btn{
    border:none;border-radius:6px;padding:6px 14px;
    font-weight:700;font-size:11px;cursor:pointer;
    letter-spacing:.03em;font-family:inherit;transition:all .15s;
    white-space:nowrap;
  }
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.35;cursor:default}
  .btn-primary{background:var(--grad);color:#0c0a14}
  .btn-outline{background:transparent;color:#c4b5fd;border:1px solid #a78bfa}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-sm{padding:4px 10px;font-size:10px}

  .toolbar label{
    font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;
  }
  .toolbar input[type="range"]{width:80px;accent-color:#a78bfa}
  .toolbar .size-val{color:var(--text);min-width:32px;font-size:11px}
  .detecting{color:#c4b5fd;font-size:11px;animation:pulse 1s infinite}

  /* Main content area */
  .main{
    flex:1;display:flex;overflow:hidden;min-height:0;
  }

  /* Resizer handle */
  .resizer{
    width:6px;flex-shrink:0;cursor:col-resize;
    background:var(--border);position:relative;
    transition:background .15s;z-index:5;
  }
  .resizer:hover,.resizer.active{background:#a78bfa}
  .resizer::after{
    content:'';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:2px;height:32px;border-radius:1px;
    background:var(--muted);opacity:.5;
  }
  .resizer:hover::after,.resizer.active::after{background:var(--bg);opacity:.8}

  /* Left: thumbs + canvas */
  .left-panel{
    flex:1;display:flex;flex-direction:column;min-width:200px;overflow:hidden;
  }

  /* Thumbnail strip */
  .thumb-strip{
    display:flex;gap:6px;padding:8px 16px;
    overflow-x:auto;flex-shrink:0;
    border-bottom:1px solid var(--border);
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  }
  .thumb-strip::-webkit-scrollbar{height:4px}
  .thumb-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .thumb{
    width:52px;height:52px;border-radius:6px;overflow:hidden;
    border:2px solid var(--border);cursor:pointer;position:relative;
    transition:border-color .15s;flex-shrink:0;
  }
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb.active{border-color:#a78bfa}
  .thumb.done{border-color:#f472b6;opacity:.7}
  .thumb .badge{
    position:absolute;top:-3px;right:-3px;width:14px;height:14px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:8px;color:var(--bg);font-weight:700;
  }
  .badge-done{background:#a78bfa}
  .badge-num{background:var(--muted)}
  .thumb .rm{
    position:absolute;top:-4px;left:-4px;width:16px;height:16px;
    border-radius:50%;background:var(--danger);color:#fff;
    font-size:10px;display:none;align-items:center;justify-content:center;
    cursor:pointer;border:none;font-family:inherit;line-height:1;
  }
  .thumb:hover .rm{display:flex}

  /* Canvas */
  .canvas-area{
    flex:1;position:relative;overflow:hidden;
    touch-action:none;user-select:none;
    background:var(--surface);
  }
  .canvas-area canvas{position:absolute;top:0;left:0}

  /* Right: results */
  .right-panel{
    width:220px;flex-shrink:0;min-width:120px;max-width:500px;
    border-left:none;
    display:flex;flex-direction:column;overflow:hidden;
    background:var(--bg);
  }
  .right-header{
    padding:10px 12px;font-size:11px;
    letter-spacing:.06em;font-weight:700;
    background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  .result-scroll{
    flex:1;overflow-y:auto;padding:8px;
    display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  }
  .result-scroll::-webkit-scrollbar{width:4px}
  .result-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .result-card{
    background:var(--surface);border:1px solid var(--border);border-radius:6px;
    overflow:hidden;position:relative;width:88px;
  }
  .result-card img{width:88px;height:88px;object-fit:cover;display:block}
  .result-card .card-info{
    padding:3px 4px;display:flex;flex-direction:column;gap:2px;
  }
  .result-card .card-name{
    font-size:8px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .result-card .card-actions{display:flex;gap:3px}
  .card-actions button{
    background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:4px;padding:2px 6px;
    font-size:9px;cursor:pointer;font-family:inherit;
    transition:all .15s;
  }
  .card-actions button:hover{border-color:#a78bfa;color:#c4b5fd}

  .right-footer{
    padding:8px;border-top:1px solid var(--border);
    display:flex;flex-direction:column;gap:6px;
  }

  /* Upload overlay */
  .upload-overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--bg);z-index:10;
  }
  .upload-box{
    width:min(320px,70vw);height:160px;
    border:2px dashed var(--border);border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;background:var(--surface);transition:border-color .2s;
  }
  .upload-box:hover,.upload-box.dragover{border-color:#a78bfa}
  .upload-box input{display:none}
  .upload-box span{color:var(--muted);font-size:13px;margin-top:12px}

  /* Toast */
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--accent);color:var(--bg);
    padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;
    opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;
  }
  .toast.show{opacity:1}

  .hidden{display:none!important}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* Google Ads containers */
  .ad-container{
    width:100%;text-align:center;
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:4px 0;min-height:90px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .ad-container-bottom{
    width:100%;text-align:center;
    background:var(--surface);border-top:1px solid var(--border);
    padding:4px 0;min-height:90px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:fixed;bottom:0;left:0;z-index:100;
  }
  .main{padding-bottom:100px}
</style>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <h1>FORLAB</h1>
    <div class="progress-mini" id="progressArea">
      <span id="progressText">0 / 0</span>
      <div class="bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <span class="detecting hidden" id="detectingLabel">● 감지 중</span>

  <div class="toolbar-group">
    <label>
      크롭
      <input type="range" min="60" max="120" value="100" id="cropSizeSlider">
      <span class="size-val" id="cropSizeVal">100%</span>

  <div class="toolbar-group">
    <button class="btn btn-outline btn-sm" id="redetectBtn">재감지</button>

<!-- Top Ad Banner -->

       style="display:inline-block;width:728px;height:90px"
       data-ad-client="ca-pub-8434032741883820"
       data-ad-slot="XXXXXXXXXX"></ins>

<!-- Main -->
<div class="main">
  <!-- Left -->
  <div class="left-panel">
    <div class="thumb-strip" id="thumbStrip"></div>
    <div class="canvas-area" id="canvasArea">
      <canvas id="mainCanvas"></canvas>
      <!-- Upload overlay -->
      <div class="upload-overlay" id="uploadOverlay">
        <label class="upload-box" id="uploadBox">
          <input type="file" accept="image/*" multiple id="fileInput">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6b7d8e" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          <span style="font-size:12px">이미지를 선택하거나 드래그</span>

      <button class="btn btn-outline" id="shareAllBtn" disabled style="width:100%;font-size:11px">전체 공유</button>

    </div>

<!-- Bottom Ad Banner (Fixed) -->
<div class="ad-container-bottom">
  <ins class="adsbygoogle"
       style="display:inline-block;width:728px;height:90px"
       data-ad-client="ca-pub-8434032741883820"
       data-ad-slot="XXXXXXXXXX"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<script>
(function(){
  let images=[];
  let currentIdx=0;
  let cropSize=100;
  let dragging=null;
  let scale=1,offX=0,offY=0,dispW=0,dispH=0;

  const $=id=>document.getElementById(id);
  const mainCanvas=$('mainCanvas'),ctx=mainCanvas.getContext('2d');
  const canvasArea=$('canvasArea');

  function showToast(msg){
    const t=$('toast');t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1800);
  }

  // --- Detection ---
  function detectPlate(img){
    const c=document.createElement('canvas');
    const sz=300,sd=Math.min(sz/img.naturalWidth,sz/img.naturalHeight);
    const w=Math.round(img.naturalWidth*sd),h=Math.round(img.naturalHeight*sd);
    c.width=w;c.height=h;
    const x=c.getContext('2d');x.drawImage(img,0,0,w,h);
    const d=x.getImageData(0,0,w,h).data;
    const gray=new Float32Array(w*h);
    for(let i=0;i<w*h;i++) gray[i]=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
    const edges=new Float32Array(w*h);
    for(let y=1;y<h-1;y++) for(let xx=1;xx<w-1;xx++){
      const gx=-gray[(y-1)*w+xx-1]+gray[(y-1)*w+xx+1]-2*gray[y*w+xx-1]+2*gray[y*w+xx+1]-gray[(y+1)*w+xx-1]+gray[(y+1)*w+xx+1];
      const gy=-gray[(y-1)*w+xx-1]-2*gray[(y-1)*w+xx]-gray[(y-1)*w+xx+1]+gray[(y+1)*w+xx-1]+2*gray[(y+1)*w+xx]+gray[(y+1)*w+xx+1];
      edges[y*w+xx]=Math.sqrt(gx*gx+gy*gy);
    }
    let maxE=0;for(let i=0;i<edges.length;i++) if(edges[i]>maxE) maxE=edges[i];
    const thr=maxE*.25,pts=[];
    for(let y=2;y<h-2;y++) for(let xx=2;xx<w-2;xx++) if(edges[y*w+xx]>thr) pts.push([xx,y]);
    const minR=Math.round(Math.min(w,h)*.2),maxR=Math.round(Math.min(w,h)*.48);
    const rSt=Math.max(1,Math.round((maxR-minR)/20)),aS=36;
    let bs=0,bx=w/2,by=h/2,br=Math.min(w,h)*.35;
    function hough(rMin,rMax,step){
      for(let r=rMin;r<=rMax;r+=step){
        const aw=Math.ceil(w/2),ah=Math.ceil(h/2),acc=new Float32Array(aw*ah);
        for(const[ex,ey]of pts) for(let a=0;a<aS;a++){
          const ang=2*Math.PI*a/aS;
          const cx=Math.round((ex-r*Math.cos(ang))/2),cy=Math.round((ey-r*Math.sin(ang))/2);
          if(cx>=0&&cx<aw&&cy>=0&&cy<ah) acc[cy*aw+cx]++;
        }
        for(let j=0;j<acc.length;j++) if(acc[j]>bs){
          bs=acc[j];bx=(j%Math.ceil(w/2))*2;by=Math.floor(j/Math.ceil(w/2))*2;br=r;
        }
      }
    }
    hough(minR,maxR,rSt);
    hough(Math.max(minR,br-rSt*2),Math.min(maxR,br+rSt*2),1);
    return{cx:bx/sd,cy:by/sd,r:br/sd};
  }

  // --- Layout ---
  function computeLayout(img){
    const rect=canvasArea.getBoundingClientRect();
    const iw=img.naturalWidth,ih=img.naturalHeight;
    scale=Math.min(rect.width/iw,rect.height/ih,1);
    dispW=Math.round(iw*scale);dispH=Math.round(ih*scale);
    offX=Math.round((rect.width-dispW)/2);offY=Math.round((rect.height-dispH)/2);
    mainCanvas.width=rect.width;mainCanvas.height=rect.height;
    mainCanvas.style.width=rect.width+'px';mainCanvas.style.height=rect.height+'px';
  }

  function toImgCoords(cx,cy){
    const rect=canvasArea.getBoundingClientRect();
    return{x:(cx-rect.left-offX)/scale,y:(cy-rect.top-offY)/scale};
  }

  // --- Draw ---
  function draw(){
    const item=images[currentIdx];
    if(!item||!item.img)return;
    const cw=mainCanvas.width,ch=mainCanvas.height;
    ctx.clearRect(0,0,cw,ch);
    ctx.drawImage(item.img,offX,offY,dispW,dispH);
    const circle=item.circle;if(!circle)return;
    const cx=circle.cx*scale+offX,cy=circle.cy*scale+offY,r=circle.r*scale;
    const side=r*2*(cropSize/100),half=side/2;

    ctx.save();ctx.beginPath();ctx.rect(0,0,cw,ch);
    ctx.arc(cx,cy,r,0,Math.PI*2,true);ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fill();ctx.restore();

    ctx.save();ctx.setLineDash([6,4]);
    ctx.strokeStyle=item.confirmed?'#ffc84e':'#a78bfa';
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();

    ctx.save();ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(255,255,255,0.7)';
    ctx.lineWidth=1.5;ctx.strokeRect(cx-half,cy-half,side,side);ctx.restore();

    for(const deg of[0,90,180,270]){
      const rad=deg*Math.PI/180;
      ctx.beginPath();ctx.arc(cx+r*Math.cos(rad),cy+r*Math.sin(rad),6,0,Math.PI*2);
      ctx.fillStyle=item.confirmed?'#ffc84e':'#f472b6';ctx.fill();
      ctx.strokeStyle='#0a0f14';ctx.lineWidth=2;ctx.stroke();
    }

    // filename overlay
    ctx.save();ctx.font='12px JetBrains Mono';ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(item.name,offX+8,offY+20);ctx.restore();
  }

  // --- Thumbs ---
  function renderThumbs(){
    const strip=$('thumbStrip');strip.innerHTML='';
    images.forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='thumb'+(i===currentIdx?' active':'')+(item.confirmed?' done':'');
      const img=document.createElement('img');img.src=item.img.src;div.appendChild(img);
      const badge=document.createElement('div');
      badge.className='badge '+(item.confirmed?'badge-done':'badge-num');
      badge.textContent=item.confirmed?'✓':(i+1);div.appendChild(badge);
      const rm=document.createElement('button');rm.className='rm';rm.textContent='×';
      rm.onclick=function(e){
        e.stopPropagation();images.splice(i,1);
        if(!images.length){resetAll();return;}
        if(currentIdx>=images.length)currentIdx=images.length-1;
        showCurrent();renderThumbs();updateProgress();
      };
      div.appendChild(rm);
      div.onclick=function(){currentIdx=i;showCurrent();renderThumbs();};
      strip.appendChild(div);
    });
    // scroll active into view
    const active=strip.querySelector('.active');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }

  function updateProgress(){
    const confirmed=images.filter(x=>x.confirmed).length;
    $('progressText').textContent=confirmed+' / '+images.length+' 확인';
    $('progressFill').style.width=(images.length?confirmed/images.length*100:0)+'%';
    $('cropAllBtn').disabled=confirmed===0;
  }

  function showCurrent(){
    const item=images[currentIdx];if(!item)return;
    requestAnimationFrame(()=>{
      computeLayout(item.img);
      if(!item.circle){
        $('detectingLabel').classList.remove('hidden');
        setTimeout(()=>{
          item.circle=detectPlate(item.img);
          $('detectingLabel').classList.add('hidden');
          draw();
        },30);
      } else draw();
    });
  }

  // --- Add images ---
  function addFiles(files){
    const arr=Array.from(files).filter(f=>f.type.startsWith('image/'));
    if(!arr.length)return;
    let loaded=0;
    arr.forEach(file=>{
      const reader=new FileReader();
      reader.onload=function(ev){
        const img=new Image();
        img.onload=function(){
          images.push({file,img,circle:null,confirmed:false,dataURL:null,name:file.name});
          loaded++;
          if(loaded===arr.length){
            $('uploadOverlay').classList.add('hidden');
            showCurrent();renderThumbs();updateProgress();
          }
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // --- Crop ---
  function cropItem(item){
    const c=item.circle;if(!c)return null;
    const iw=item.img.naturalWidth,ih=item.img.naturalHeight;
    const side=c.r*2*(cropSize/100),half=side/2;
    const sx=Math.max(0,c.cx-half),sy=Math.max(0,c.cy-half);
    const sw=Math.min(side,iw-sx),sh=Math.min(side,ih-sy);
    const cv=document.createElement('canvas');
    cv.width=680;cv.height=680;
    const tmpCv=document.createElement('canvas');
    tmpCv.width=sw;tmpCv.height=sh;
    tmpCv.getContext('2d').drawImage(item.img,sx,sy,sw,sh,0,0,sw,sh);
    cv.getContext('2d').drawImage(tmpCv,0,0,sw,sh,0,0,680,680);
    return cv.toDataURL('image/png');
  }

  function renderResults(){
    const scroll=$('resultScroll');scroll.innerHTML='';
    const confirmed=images.filter(x=>x.confirmed&&x.dataURL);
    $('resultCount').textContent=confirmed.length+'장';
    $('downloadAllBtn').disabled=!confirmed.length;
    if($('shareAllBtn')) $('shareAllBtn').disabled=!confirmed.length;


    confirmed.forEach((item,i)=>{
      const card=document.createElement('div');card.className='result-card';
      const img=document.createElement('img');img.src=item.dataURL;img.draggable=true;
      img.addEventListener('dragstart',function(ev){
        ev.dataTransfer.setData('text/uri-list',item.dataURL);
        ev.dataTransfer.setData('text/plain',cropName);
        ev.dataTransfer.effectAllowed='copy';
      });
      card.appendChild(img);
      const info=document.createElement('div');info.className='card-info';
      const nm=document.createElement('div');nm.className='card-name';
      const now=new Date();const dateStr=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
      const cropName=dateStr+'_plate'+(i+1)+'.png';
      nm.textContent=cropName;info.appendChild(nm);

      const actions=document.createElement('div');actions.className='card-actions';

      const copyBtn=document.createElement('button');copyBtn.textContent='복사';
      copyBtn.onclick=async function(){
        try{
          const resp=await fetch(item.dataURL);
          const blob=await resp.blob();
          const pngBlob=new Blob([blob],{type:'image/png'});
          await navigator.clipboard.write([new ClipboardItem({'image/png':pngBlob})]);
          showToast('클립보드에 복사됨');
        }catch(e){showToast('복사 실패');}
      };
      actions.appendChild(copyBtn);

      const dlBtn=document.createElement('button');dlBtn.textContent='저장';
      dlBtn.onclick=function(){
        const a=document.createElement('a');a.href=item.dataURL;a.download=cropName;a.click();
      };
      actions.appendChild(dlBtn);

      if(navigator.share){
        const shareBtn=document.createElement('button');shareBtn.textContent='공유';
        shareBtn.onclick=async function(){
          try{
            const resp=await fetch(item.dataURL);
            const blob=await resp.blob();
            const file=new File([blob],cropName,{type:'image/png'});
            if(navigator.canShare&&navigator.canShare({files:[file]})){
              await navigator.share({files:[file],title:cropName});
            } else {
              // fallback: share as URL or download
              try{ await navigator.share({title:cropName,text:'Plate crop image'}); }
              catch(e2){
                const a=document.createElement('a');a.href=item.dataURL;a.download=cropName;a.click();
                showToast('공유 불가 → 다운로드됨');
              }
            }
          }catch(e){
            if(e.name!=='AbortError'){
              const a=document.createElement('a');a.href=item.dataURL;a.download=cropName;a.click();
              showToast('공유 불가 → 다운로드됨');
            }
          }
        };
        actions.appendChild(shareBtn);
      }

      info.appendChild(actions);card.appendChild(info);scroll.appendChild(card);
    });
  }

  function resetAll(){
    images=[];currentIdx=0;dragging=null;
    $('uploadOverlay').classList.remove('hidden');
    $('thumbStrip').innerHTML='';
    $('resultScroll').innerHTML='<div style="color:var(--muted);font-size:11px;text-align:center;padding:40px 8px;line-height:1.6">사진을 확인한 후<br>"전체 크롭" 버튼을 누르면<br>여기에 결과가 표시됩니다</div>';
    $('resultCount').textContent='0장';
    $('downloadAllBtn').disabled=true;
    $('cropAllBtn').disabled=true;
    $('progressText').textContent='0 / 0';
    $('progressFill').style.width='0%';
    $('fileInput').value='';
    ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
  }

  // --- Events ---
  $('fileInput').addEventListener('change',e=>addFiles(e.target.files));
  const ub=$('uploadBox');
  ub.addEventListener('dragover',e=>{e.preventDefault();ub.classList.add('dragover')});
  ub.addEventListener('dragleave',()=>ub.classList.remove('dragover'));
  ub.addEventListener('drop',e=>{e.preventDefault();ub.classList.remove('dragover');addFiles(e.dataTransfer.files)});

  $('addMoreBtn').addEventListener('click',()=>$('addMoreInput').click());
  $('addMoreInput').addEventListener('change',e=>addFiles(e.target.files));

  $('cropSizeSlider').addEventListener('input',function(){
    cropSize=Number(this.value);$('cropSizeVal').textContent=cropSize+'%';draw();
  });

  $('redetectBtn').addEventListener('click',()=>{
    const item=images[currentIdx];if(!item)return;
    $('detectingLabel').classList.remove('hidden');
    setTimeout(()=>{item.circle=detectPlate(item.img);$('detectingLabel').classList.add('hidden');draw();},30);
  });

  $('confirmBtn').addEventListener('click',()=>{
    const item=images[currentIdx];if(!item)return;
    item.confirmed=true;
    renderThumbs();updateProgress();
    const next=images.findIndex((x,i)=>i>currentIdx&&!x.confirmed);
    if(next!==-1){currentIdx=next;showCurrent();renderThumbs();}
    else{
      const first=images.findIndex(x=>!x.confirmed);
      if(first!==-1){currentIdx=first;showCurrent();renderThumbs();}
      else draw();
    }
  });

  $('skipBtn').addEventListener('click',()=>{
    if(currentIdx<images.length-1){currentIdx++;showCurrent();renderThumbs();}
  });

  $('autoAllBtn').addEventListener('click',()=>{
    let idx=0;
    function next(){
      if(idx>=images.length){renderThumbs();updateProgress();showCurrent();return;}
      const item=images[idx];
      if(!item.circle) item.circle=detectPlate(item.img);
      item.confirmed=true;idx++;
      $('progressText').textContent='자동 처리 '+idx+'/'+images.length;
      $('progressFill').style.width=(idx/images.length*100)+'%';
      setTimeout(next,10);
    }
    next();
  });

  $('cropAllBtn').addEventListener('click',()=>{
    const confirmed=images.filter(x=>x.confirmed);
    confirmed.forEach(item=>{item.dataURL=cropItem(item);});
    renderResults();
    showToast(confirmed.length+'장 크롭 완료');
  });

  $('resetAllBtn').addEventListener('click',resetAll);

  $('downloadAllBtn').addEventListener('click',()=>{
    const confirmed=images.filter(x=>x.confirmed&&x.dataURL);
    if(!confirmed.length)return;
    let i=0;
    function dlNext(){
      if(i>=confirmed.length){showToast(confirmed.length+'장 다운로드 완료');return;}
      const item=confirmed[i];
      const a=document.createElement('a');
      a.href=item.dataURL;
      const now=new Date();const ds=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
      a.download=ds+'_plate'+(i+1)+'.png';
      a.click();
      i++;
      setTimeout(dlNext,300);
    }
    dlNext();
  });

  // Hide share buttons on unsupported devices
  (function(){
    const canShare = navigator.share && navigator.canShare;
    if(!canShare){
      const sa=$('shareAllBtn');if(sa) sa.style.display='none';
    }
  })();

  $('shareAllBtn').addEventListener('click',async()=>{
    const confirmed=images.filter(x=>x.confirmed&&x.dataURL);
    if(!confirmed.length)return;
    try{
      const now=new Date();const ds=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
      const files=[];
      for(let i=0;i<confirmed.length;i++){
        const resp=await fetch(confirmed[i].dataURL);
        const blob=await resp.blob();
        files.push(new File([blob],ds+'_plate'+(i+1)+'.png',{type:'image/png'}));
      }
      if(navigator.canShare&&navigator.canShare({files})){
        await navigator.share({files,title:'Plate Crops'});
      } else {
        // fallback: download all
        let idx=0;
        function dl(){
          if(idx>=confirmed.length){showToast('공유 불가 → '+confirmed.length+'장 다운로드됨');return;}
          const a=document.createElement('a');a.href=confirmed[idx].dataURL;
          a.download=ds+'_plate'+(idx+1)+'.png';a.click();idx++;setTimeout(dl,300);
        }
        dl();
      }
    }catch(e){
      if(e.name!=='AbortError'){
        showToast('공유 불가 → 다운로드로 전환');
        $('downloadAllBtn').click();
      }
    }
  });

  // Pointer
  canvasArea.addEventListener('pointerdown',e=>{
    const item=images[currentIdx];if(!item||!item.circle)return;
    const pos=toImgCoords(e.clientX,e.clientY);
    const c=item.circle;
    const dist=Math.sqrt((pos.x-c.cx)**2+(pos.y-c.cy)**2);
    if(Math.abs(dist-c.r)<c.r*.12) dragging={type:'resize'};
    else if(dist<c.r) dragging={type:'move',ox:pos.x-c.cx,oy:pos.y-c.cy};
    else return;
    canvasArea.setPointerCapture(e.pointerId);
  });
  canvasArea.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const item=images[currentIdx];if(!item||!item.circle)return;
    const pos=toImgCoords(e.clientX,e.clientY);const c=item.circle;
    if(dragging.type==='move'){c.cx=pos.x-dragging.ox;c.cy=pos.y-dragging.oy;}
    else c.r=Math.max(30,Math.sqrt((pos.x-c.cx)**2+(pos.y-c.cy)**2));
    item.confirmed=false;renderThumbs();updateProgress();draw();
  });
  canvasArea.addEventListener('pointerup',()=>{dragging=null});
  canvasArea.addEventListener('pointerleave',()=>{dragging=null});

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(!images.length)return;
    if(e.target.tagName==='INPUT')return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){
      e.preventDefault();if(currentIdx<images.length-1){currentIdx++;showCurrent();renderThumbs();}
    }
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
      e.preventDefault();if(currentIdx>0){currentIdx--;showCurrent();renderThumbs();}
    }
    if(e.key==='Enter'){e.preventDefault();$('confirmBtn').click();}
  });

  // --- Resizer ---
  (function(){
    const resizer=$('resizer'),rightPanel=$('rightPanel'),main=document.querySelector('.main');
    let startX,startW;
    resizer.addEventListener('pointerdown',function(e){
      e.preventDefault();
      startX=e.clientX;startW=rightPanel.offsetWidth;
      resizer.classList.add('active');
      resizer.setPointerCapture(e.pointerId);
    });
    resizer.addEventListener('pointermove',function(e){
      if(!resizer.classList.contains('active'))return;
      const diff=startX-e.clientX;
      const newW=Math.min(500,Math.max(120,startW+diff));
      rightPanel.style.width=newW+'px';
      // re-layout canvas
      const item=images[currentIdx];
      if(item&&item.img){computeLayout(item.img);draw();}
    });
    resizer.addEventListener('pointerup',function(){resizer.classList.remove('active')});
    resizer.addEventListener('lostpointercapture',function(){resizer.classList.remove('active')});
  })();

  window.addEventListener('resize',()=>{
    if(!images.length)return;
    const item=images[currentIdx];if(!item)return;
    computeLayout(item.img);draw();
  });
})();
</script>
</body>
</html>
